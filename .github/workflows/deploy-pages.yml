name: Deploy to GitHub Pages

on:
  schedule:
    - cron: '0 23 * * 0-4'  # KST 08:00 (월~금) — 장전 full 모드
  workflow_dispatch:
    inputs:
      mode:
        description: "실행 모드 (full: Gemini+텔레그램 포함, data-only: 데이터만)"
        required: false
        default: "data-only"
        type: choice
        options:
          - full
          - data-only
  push:
    branches: [main]
    paths: ['frontend/**']

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: stock-toolkit-pages
      cancel-in-progress: true
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    env:
      # schedule 트리거(08:00 장전) → full, push → data-only, workflow_dispatch → 입력값
      RUN_MODE: ${{ github.event_name == 'schedule' && 'full' || inputs.mode || 'data-only' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 5
      - name: 배포 시작 알림
        run: |
          MSG="🚀 <b>[Stock Toolkit] 배포 시작</b>
          모드: ${{ env.RUN_MODE }}
          트리거: ${{ github.event_name }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=HTML \
            --data-urlencode "text=${MSG}"
      - uses: actions/checkout@v4
        with:
          repository: xxonbang/theme-analyzer
          path: theme_analysis
      - uses: actions/checkout@v4
        with:
          repository: xxonbang/signal-pulse
          path: signal_analysis
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Preserve existing AI outputs
        if: ${{ env.RUN_MODE == 'data-only' }}
        run: |
          mkdir -p results
          BASE="https://xxonbang.github.io/stock_toolkit/data"
          for f in briefing.json; do
            curl -sf "$BASE/$f" -o "results/$f" || echo "기존 $f 없음"
          done
      - name: Run all phases
        run: python scripts/run_all.py --mode ${{ env.RUN_MODE }}
        env:
          THEME_ANALYSIS_DATA_PATH: theme_analysis/frontend/public/data
          SIGNAL_ANALYSIS_DATA_PATH: signal_analysis/results
          GEMINI_API_KEY_01: ${{ secrets.GEMINI_API_KEY_01 }}
          GEMINI_API_KEY_02: ${{ secrets.GEMINI_API_KEY_02 }}
          GEMINI_API_KEY_03: ${{ secrets.GEMINI_API_KEY_03 }}
          GEMINI_API_KEY_04: ${{ secrets.GEMINI_API_KEY_04 }}
          GEMINI_API_KEY_05: ${{ secrets.GEMINI_API_KEY_05 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and build
        working-directory: frontend
        run: |
          npm install
          npm run build
        env:
          VITE_GH_PAT: ${{ secrets.VITE_GH_PAT }}
          VITE_CRONJOB_API_KEY: ${{ secrets.VITE_CRONJOB_API_KEY }}
      - name: Validate required results
        run: |
          REQUIRED="performance.json cross_signal.json smart_money.json scanner_stocks.json sentiment.json"
          MISSING=0
          for f in $REQUIRED; do
            if [ ! -f "results/$f" ]; then
              echo "❌ 필수 파일 누락: $f"
              MISSING=$((MISSING+1))
            fi
          done
          if [ $MISSING -gt 2 ]; then
            echo "❌ 필수 파일 3개 이상 누락 — 배포 중단"
            exit 1
          fi
      - name: Copy results to dist
        run: |
          mkdir -p frontend/dist/data
          cp results/*.json frontend/dist/data/ 2>/dev/null || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist
      - uses: actions/deploy-pages@v4

      - name: 배포 완료 알림
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=HTML \
            -d text="✅ <b>[Stock Toolkit] 배포 완료</b>%0A모드: ${{ env.RUN_MODE }}%0A🔗 https://xxonbang.github.io/stock_toolkit/"

      - name: 배포 실패 알림
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=HTML \
            -d text="❌ <b>[Stock Toolkit] 배포 실패</b>%0A모드: ${{ env.RUN_MODE }}%0A확인: https://github.com/xxonbang/stock_toolkit/actions"
