name: News TOP3 (Stock Insight)

on:
  # 정기 실행은 cron-job.org가 KST 07:30 / 20:00에 workflow_dispatch로 트리거
  # (jobs id 7541447, 7541448 — Asia/Seoul 타임존 직접 지원, GitHub Actions cron(UTC)보다 직관적)
  workflow_dispatch:
    inputs:
      skip_ai:
        description: "AI 분석 생략 (수집만)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    concurrency:
      group: news-top3
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run news_top3 pipeline
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          # ai_client.py는 GOOGLE_API_KEY_* 를 읽으나 기존 repo secret 이름은 GEMINI_API_KEY_* 라 매핑
          GOOGLE_API_KEY_01: ${{ secrets.GEMINI_API_KEY_01 }}
          GOOGLE_API_KEY_02: ${{ secrets.GEMINI_API_KEY_02 }}
          GOOGLE_API_KEY_03: ${{ secrets.GEMINI_API_KEY_03 }}
          GOOGLE_API_KEY_04: ${{ secrets.GEMINI_API_KEY_04 }}
          GOOGLE_API_KEY_05: ${{ secrets.GEMINI_API_KEY_05 }}
        run: |
          if [ "${{ inputs.skip_ai }}" = "true" ]; then
            python scripts/news_top3.py --skip-ai --verbose
          else
            python scripts/news_top3.py --verbose
          fi

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/news_top3_latest.json results/news_top3_history/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            TS=$(TZ=Asia/Seoul date +"%Y-%m-%d %H:%M KST")
            git commit -m "data: news_top3 ${TS}"
            git push origin main
          fi
